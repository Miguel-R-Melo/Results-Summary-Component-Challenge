<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Summary Challenge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="assets/icon/favicon-32x32.png" type="image/x-icon">
</head>
<body>
    <div class="container">
        <div class="cont-result">
            <h1>Your result</h1>
            <div class="score">
                <p id="actual-score">76</p>       
                <p id="total-score">of 100</p>
            </div>
            <span>Great</span>
            <p>You scored higher than 65% of the people who have taken these tests.</p>
        </div>
        <div class="cont-summary">
            <span>Summary</span>
            <div class="topics">
                <img src="assets/images/icon-reaction.svg" alt="#">
                <span>Reaction</span>
                <span>80/100</span>
            </div>
            <div class="topics">
                <img src="assets/images/icon-memory.svg" alt="#">
                <p>Memory</p>
                <p>92/100</p>
            </div>
            <div class="topics">
                <img src="assets/images/icon-verbal.svg" alt="#">
                <span>Verbal</span>
                <span>61/100</span>
            </div>
            <div class="topics">
                <img src="assets/images/icon-visual.svg" alt="#">
                <span>Visual</span>
                <span>73/100</span>
            </div> 
            <button>Continue</button>  
        </div>
    </div>
</body>
</html>
